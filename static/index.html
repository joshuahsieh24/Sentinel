<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>Sentinel</title>
<style>
  :root { --bg: #0b0e13; --surface: #141821; --text: #e2e6ee; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; }
</style>
</head>
<body>
<div id="header" style="display:flex; justify-content:space-between; padding:20px; background:var(--surface);">
  <div style="text-transform:uppercase; letter-spacing:0.1em;">Sentinel</div>
  <div id="score-block"><span id="score-value" style="font-size:48px;">--</span></div>
</div>
<div id="main" style="display:flex; height:calc(100vh - 88px);">
  <div id="left-panel" style="width:60%; border-right:1px solid rgba(255,255,255,0.1);"></div>
<svg id="floorplan" viewBox="0 0 680 520" style="width:100%; height:100%;"> 
  <rect id="zone-lobby" x="20" y="40" width="200" height="220" fill="rgba(74,222,128,0.05)" stroke="#4ade80" /> 
  <rect id="zone-loading_dock" x="240" y="40" width="200" height="220" fill="rgba(74,222,128,0.05)" stroke="#4ade80" /> 
  <rect id="zone-server_room" x="460" y="40" width="200" height="220" fill="rgba(74,222,128,0.05)" stroke="#4ade80" /> 
</svg> 

  <div id="right-panel" style="width:40%;"></div>
</div>
</body>
</html>
<script>
let ws;
function connectWS() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state') console.log('state', msg);
    else if (msg.type === 'event') console.log('event', msg);
  };
}
connectWS();
</script>
